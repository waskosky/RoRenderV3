<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
    <title>RoRenderV3</title>
    <link rel="stylesheet" href="css/mdb.min.css">
    <link rel="stylesheet" href="css/custom.css">
    <style>
        body { background: #f4f6f8; }
        .render-frame { aspect-ratio: 1 / 1; background: #dfe5ea; border-radius: 10px; overflow: hidden; position: relative; }
        .render-frame img, .render-frame canvas { height: 100%; left: 0; object-fit: contain; position: absolute; top: 0; width: 100%; }
        #serverStatus { min-height: 1.5rem; overflow-wrap: anywhere; }
    </style>
    <script defer src="renderer.js"></script>
</head>
<body>
<main class="container">
    <div class="row justify-content-center py-4">
        <section class="col-md-7" aria-label="Render preview">
            <div class="render-frame">
                <img id="main-img" src="img/grid.png" alt="Empty render grid">
                <canvas id="render-preview" aria-label="Orthographic map preview"></canvas>
            </div>
            <button class="mt-4 btn-lg btn btn-white" id="help" type="button">Help</button>
            <button class="mt-4 btn-lg btn btn-link float-end" id="exportImage" type="button" disabled>
                Save PNG
            </button>
        </section>
        <section class="col-md-5" aria-label="Render status">
            <div class="card text-center mb-4">
                <div class="card-body d-flex justify-content-center align-items-center">
                    <div class="progress" data-percentage="0" id="datapercentage" aria-label="Render progress">
                        <span class="progress-left"><span class="progress-bar"></span></span>
                        <span class="progress-right"><span class="progress-bar"></span></span>
                        <div class="progress-value">
                            <div class="fw-bold" style="font-size: 42px" id="datapercentagetext">0%</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card text-center">
                <div class="card-body d-flex justify-content-center align-items-center">
                    <h1 style="font-size: 42px" id="timer">00:00:00</h1>
                </div>
            </div>
            <button class="btn-lg btn btn-primary btn-block mt-4" id="startServer" type="button">
                Start local provider
            </button>
            <p class="text-muted mt-3" id="serverStatus" role="status">Ready to listen on loopback.</p>
        </section>
    </div>
</main>
</body>
</html>
